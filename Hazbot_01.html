<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wildfire Explorer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #b0c4d8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .app {
    position: relative;
    width: 1154px;
    height: 885px;
  }

  /* Full-canvas layers */
  .layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .layer img { width:100%; height:100%; display:block; }
  .layer.visible { opacity: 1; }

  /* ── BUBBLE GROUP: 310x230 placed at x=779, y=503 ── */
  #bubble-group {
    position: absolute;
    left: 779px;
    top: 503px;
    width: 310px;
    height: 230px;
    opacity: 0;
    pointer-events: none;
  }
  #bubble-group.visible {
    animation: bubbleIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    pointer-events: auto;
  }
  #bubble-group.hiding {
    animation: bubbleOut 0.4s cubic-bezier(0.4, 0, 1, 1) forwards !important;
    pointer-events: none;
  }
  @keyframes bubbleIn {
    0%   { opacity:0; transform: translateY(60px) scale(0.92); }
    60%  { opacity:1; transform: translateY(-10px) scale(1.02); }
    80%  {            transform: translateY(4px)   scale(0.99); }
    100% { opacity:1; transform: translateY(0)     scale(1);    }
  }
  @keyframes bubbleOut {
    0%   { opacity:1; transform: translateY(0) scale(1);    }
    100% { opacity:0; transform: translateY(40px) scale(0.9); }
  }
  #bubble-group img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  #bubble-group .img-bubble { opacity: 1; }
  #bubble-group .img-x,
  #bubble-group .img-okay {
    opacity: 0;
    cursor: pointer;
    transition: opacity 0.15s ease;
    background: transparent;
  }

  /* Hover zones inside bubble-group */
  .bubble-zone {
    position: absolute;
    cursor: pointer;
    z-index: 10;
  }

  /* ── PULSE layers ── */
  .pulse-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .pulse-layer img { width:100%; height:100%; display:block; }
  .pulse-layer.visible {
    animation: pulseBreath 2.0s ease-in-out infinite;
  }
  @keyframes pulseBreath {
    0%   { opacity: 0.9; }
    50%  { opacity: 0.1; }
    100% { opacity: 0.9; }
  }

  /* ── SPEECH BUBBLE IN/OUT ── */
  @keyframes speechBounceIn {
    0%   { transform: translateY(40px); }
    60%  { transform: translateY(-8px); }
    80%  { transform: translateY(3px);  }
    100% { transform: translateY(0);    }
  }
  @keyframes speechBounceOut {
    0%   { transform: translateY(0);    }
    100% { transform: translateY(25px); }
  }

  @keyframes speechIn {
    0%   { opacity:0; transform: translateY(18px) scale(0.92); }
    60%  { opacity:1; transform: translateY(-5px)  scale(1.03); }
    80%  {            transform: translateY(2px)   scale(0.98); }
    100% { opacity:1; transform: translateY(0)     scale(1);    }
  }
  @keyframes speechOut {
    0%   { opacity:1; transform: translateY(0) scale(1);    }
    100% { opacity:0; transform: translateY(14px) scale(0.93); }
  }

  /* ── BOB animation (BubbleIntro + BubbleEnd) ── */
  @keyframes introBob {
    0%   { transform: translateY(0);    }
    20%  { transform: translateY(-6px); }
    40%  { transform: translateY(0);    }
    60%  { transform: translateY(-4px); }
    80%  { transform: translateY(0);    }
    100% { transform: translateY(0);    }
  }

  /* ── ARROW NUDGE ── */
  @keyframes arrowNudge {
    0%   { transform:translateY(0);    }
    20%  { transform:translateY(7px);  }
    40%  { transform:translateY(-2px); }
    60%  { transform:translateY(5px);  }
    80%  { transform:translateY(-1px); }
    100% { transform:translateY(0);    }
  }
</style>
</head>

  <!-- Character click zone: top=729,left=882,w=115,h=121 -->
  <div id="char-click-zone" style="position:absolute;top:729px;left:882px;width:115px;height:121px;cursor:pointer;z-index:20;"></div>

  <!-- Spark click zone (enabled after spark outline appears) -->
  <div id="spark-click-zone" style="position:absolute;top:761px;left:467px;width:69px;height:82px;cursor:pointer;z-index:20;display:none;"></div>

  <!-- Start click zone (enabled after spark clicked) -->
  <div id="start-click-zone" style="position:absolute;top:761px;left:662px;width:69px;height:82px;cursor:pointer;z-index:20;display:none;"></div>

</div>
<script>
  const nudgeTimers = {};
  let dismissed = false;
  let sequenceRunning = false;
  const wait = ms => new Promise(r => setTimeout(r, ms));

  // ── SHOW / HIDE helpers ──
  function show(id) {
    document.getElementById(id).classList.add('visible');
    return wait(320);
  }

  function hideEl(id) {
    document.getElementById(id).classList.remove('visible');
  }

  // ── SPEECH BUBBLE IN ──
  // Outer el controls opacity (JS style). Inner img handles transform bounce.
  function bubbleSpeechIn(id) {
    const el = document.getElementById(id);
    const img = el.querySelector('img');
    clearTimeout(bobTimers[id]);

    // Reset
    el.style.transition = 'none';
    el.style.opacity = '0';
    img.style.animation = 'none';
    img.style.transform = 'translateY(40px)';
    void el.offsetWidth;

    // Fade outer in
    el.style.transition = 'opacity 0.3s ease';
    el.style.opacity = '1';

    // Bounce inner img up
    img.style.animation = 'speechBounceIn 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
    img.addEventListener('animationend', () => {
      img.style.animation = '';
      img.style.transform = 'translateY(0)';
    }, {once: true});
  }

  // ── SPEECH BUBBLE OUT — only on char click ──
  function bubbleSpeechOut(id, callback) {
    const el = document.getElementById(id);
    const img = el.querySelector('img');
    clearTimeout(bobTimers[id]);

    img.style.animation = 'none';
    img.style.transform = 'translateY(0)';

    // Slide img down + fade outer out simultaneously
    img.style.animation = 'speechBounceOut 0.3s ease-in forwards';
    el.style.transition = 'opacity 0.3s ease';
    el.style.opacity = '0';

    setTimeout(() => {
      img.style.animation = '';
      img.style.transform = '';
      if (callback) callback();
    }, 320);
  }

  // ── HIDE ALL ──
  function hideAll() {
    if (dismissed) return;
    dismissed = true;
    Object.values(nudgeTimers).forEach(clearTimeout);

    document.getElementById('spark-click-zone').style.display = 'none';
    document.getElementById('start-click-zone').style.display = 'none';

    ['spark-outline','spark-pulse','start-outline','start-pulse',
     'arrow1','num1','arrow2','num2'].forEach(id => hideEl(id));

    // Animate bubble out, then show BubbleEnd once fully gone
    const group = document.getElementById('bubble-group');
    group.classList.add('hiding');
    group.addEventListener('animationend', () => {
      group.style.opacity = '0';
      group.classList.remove('visible', 'hiding');
      onAllDismissed();
    }, {once:true});
  }

  // ── AFTER BUBBLE IS FULLY OUT ──
  function onAllDismissed() {
    bubbleSpeechIn('bubble-end');
    scheduleBob('bubble-end');
    setTimeout(() => {
      document.getElementById('char-click-zone').style.display = 'block';
    }, 400);
  }

  // ── BOB (shared for BubbleIntro and BubbleEnd) ──
  const bobTimers = {};
  function scheduleBob(id) {
    clearTimeout(bobTimers[id]);
    bobTimers[id] = setTimeout(() => {
      const el = document.getElementById(id);
      if (!el || el.style.opacity !== '1') return;
      const img = el.querySelector('img');
      img.style.animation = 'none';
      void img.offsetWidth;
      img.style.animation = 'introBob 0.7s ease-in-out forwards';
      img.addEventListener('animationend', () => {
        img.style.animation = '';
        img.style.transform = 'translateY(0)';
        scheduleBob(id);
      }, {once:true});
    }, 2000 + Math.random() * 3000);
  }

  // ── BLINK (more frequent, longer hold) ──
  let blinkRunning = true;
  function scheduleBlink() {
    if (!blinkRunning) return;
    const gap = 1000 + Math.random() * 2500; // 1-3.5s between sequences
    setTimeout(() => {
      const doDouble = Math.random() > 0.5; // 50% chance double blink
      doBlink(() => {
        if (doDouble) {
          setTimeout(() => doBlink(scheduleBlink), 250);
        } else {
          scheduleBlink();
        }
      });
    }, gap);
  }

  function doBlink(callback) {
    const blink = document.getElementById('char-blink');
    blink.classList.add('visible');
    setTimeout(() => {
      blink.classList.remove('visible');
      if (callback) setTimeout(callback, 80);
    }, 180); // slightly longer hold
  }

  // ── NUDGE (arrows) ──
  function scheduleNudge(id) {
    clearTimeout(nudgeTimers[id]);
    if (dismissed) return;
    nudgeTimers[id] = setTimeout(() => {
      if (dismissed) return;
      const img = document.getElementById(id).querySelector('img');
      img.style.animation = 'none';
      void img.offsetWidth;
      img.style.animation = 'arrowNudge 0.55s ease-in-out forwards';
      img.addEventListener('animationend', () => {
        img.style.animation = '';
        scheduleNudge(id);
      }, {once:true});
    }, 2500 + Math.random() * 3000);
  }

  // ── SPARK BUTTON CLICK ──
  document.getElementById('spark-click-zone').addEventListener('click', () => {
    ['spark-outline','spark-pulse','arrow1','num1'].forEach(id => hideEl(id));
    document.getElementById('start-enabled').classList.add('visible');
    document.getElementById('spark-click-zone').style.display = 'none';
    document.getElementById('start-click-zone').style.display = 'block';
  });

  // ── START BUTTON CLICK ──
  document.getElementById('start-click-zone').addEventListener('click', () => {
    hideAll();
    document.getElementById('start-click-zone').style.display = 'none';
  });

  // ── BUBBLE X / OKAY ──
  const hoverMap = { 'zone-okay': 'btn-okay', 'zone-x': 'btn-x' };
  Object.entries(hoverMap).forEach(([zoneId, btnId]) => {
    const zone = document.getElementById(zoneId);
    const btn  = document.getElementById(btnId);
    zone.addEventListener('mouseenter', () => { btn.style.opacity = '1'; });
    zone.addEventListener('mouseleave', () => { btn.style.opacity = '0'; });
    zone.addEventListener('click', hideAll);
  });

  // ── CHARACTER HOVER ──
  const charZone = document.getElementById('char-click-zone');
  charZone.addEventListener('mouseenter', () => {
    document.getElementById('char-hover').classList.add('visible');
  });
  charZone.addEventListener('mouseleave', () => {
    document.getElementById('char-hover').classList.remove('visible');
  });

  // ── CHARACTER CLICK ──
  document.getElementById('char-click-zone').addEventListener('click', () => {
    document.getElementById('char-click-zone').style.display = 'none';
    document.getElementById('char-hover').classList.remove('visible');
    dismissed = false;
    sequenceRunning = true;

    // Animate out whichever speech bubble is showing, then start sequence
    const showing = ['bubble-intro','bubble-end'].find(id =>
      document.getElementById(id).style.opacity === '1'
    );
    if (showing) {
      bubbleSpeechOut(showing, runSequence);
    } else {
      runSequence();
    }
  });

  // ── MAIN SEQUENCE ──
  async function runSequence() {
    // Bubble bounces in
    const group = document.getElementById('bubble-group');
    group.style.opacity = '';
    group.classList.remove('hiding');
    group.classList.add('visible');
    await wait(400);

    await wait(500);
    show('spark-outline');
    show('spark-pulse');
    document.getElementById('spark-click-zone').style.display = 'block';
    await wait(320);

    show('num1');
    await wait(150);
    await show('arrow1');

    await wait(150);
    show('start-outline');
    show('start-pulse');
    await wait(320);

    show('num2');
    await wait(150);
    await show('arrow2');

    scheduleNudge('arrow1');
    await wait(1300);
    scheduleNudge('arrow2');
  }

  // ── INIT ──
  scheduleBlink();
  setTimeout(() => {
    bubbleSpeechIn('bubble-intro');
    scheduleBob('bubble-intro');
  }, 300);
</script>
